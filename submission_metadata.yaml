# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"
  - "Gemini"
  - "Cursor"

ai_usage_summary: |
  Used Gemini/Claude for code refactoring, architecture optimization, bug fixing, and formatting.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  A high-performance two-stage retrieve-and-rank pipeline.
  Stage 1 streams all 100k candidates to filter out hard
  exclusions (honeypots, trap titles, location blocks)
  and scores them with a lightweight heuristic to select
  the top 1,500 candidates. Stage 2 runs a deep semantic
  scoring using offline cached sentence-transformer embeddings
  ('all-MiniLM-L6-v2'), combined with experience, skills (with recency decay ),
  and employer quality signals, as well as a multi-signal availability modifier.

# ============================================================================
# Declarations
# ============================================================================
declarations:
